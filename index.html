<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>vocab.ai</title>
<style>
:root{--bg:#f6f8ff;--card:#fff;--text:#111827;--muted:#667085;--line:#e5e7eb;--blue:#2563eb;--green:#067647;--red:#b42318;--soft:#f3f4f6;--amber:#b54708}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#eaf1ff 0,#f8fafc 300px);color:var(--text);line-height:1.5}.wrap{width:min(1120px,92vw);margin:0 auto;padding:28px 0 48px}.nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}.brand{font-weight:950;font-size:1.25rem;letter-spacing:-.04em}.brand span{color:var(--blue)}.nav-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;color:#344054;font-weight:900;font-size:.9rem;cursor:pointer}.pill.active{background:var(--blue);border-color:var(--blue);color:#fff}@media(max-width:860px){.nav{align-items:flex-start;flex-direction:column}.nav-actions{justify-content:flex-start}}.card{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 50px rgba(17,24,39,.08);padding:22px;margin-bottom:18px}.stack{display:grid;gap:13px}.row{display:flex;gap:10px;flex-wrap:wrap}label{font-weight:900;display:block;margin:0 0 7px}input,select{width:100%;font:inherit;border:1px solid var(--line);border-radius:15px;background:#fff;color:var(--text);padding:13px 14px;outline:none}input:focus,select:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.12)}button{border:0;border-radius:999px;padding:11px 16px;font-weight:950;cursor:pointer;background:var(--blue);color:#fff}button.secondary{background:#fff;color:#111827;border:1px solid var(--line)}button.danger{background:#fff;color:var(--red);border:1px solid #fecaca}button:disabled{opacity:.6;cursor:not-allowed}.status{min-height:24px;margin-top:4px;font-weight:850;color:#475467}.status.ok{color:var(--green)}.status.err{color:var(--red)}.status.warn{color:var(--amber)}.samples{display:flex;flex-wrap:wrap;gap:8px}.sample{border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:6px 10px;font-weight:850;font-size:.86rem;cursor:pointer}.results{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}@media(max-width:760px){.results{grid-template-columns:1fr}}.box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;min-height:105px}.box-title{font-size:.76rem;font-weight:950;color:#667085;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}.box-value{font-weight:850;white-space:pre-wrap}.meaning{font-size:1.2rem}.history{margin-top:18px}.history-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.history-list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px}.item b{font-size:1.05rem}.meta{color:var(--muted);font-size:.85rem;margin-top:4px}.empty{color:var(--muted);border:1px dashed var(--line);border-radius:18px;padding:16px;background:#fff}.footer{font-size:.88rem;color:#667085;margin-top:16px;text-align:center}
</style>
</head>
<body>
<main class="wrap">
  <div class="nav">
    <div class="brand">vocab<span>.ai</span></div>
    <div class="nav-actions" aria-label="Vocabulary sections">
      <button class="pill" type="button" data-mode="One Word Substitution" onclick="setMode('One Word Substitution')">One Word Substitution</button>
      <button class="pill" type="button" data-mode="Idioms" onclick="setMode('Idioms')">Idioms</button>
      <button class="pill active" type="button" data-mode="Antonyms &amp; Synonyms" onclick="setMode('Antonyms & Synonyms')">Antonyms &amp; Synonyms</button>
      <button class="pill" type="button" data-mode="Spellings" onclick="setMode('Spellings')">Spellings</button>
    </div>
  </div>

  <section class="card stack">
    <div><label id="termLabel" for="term">Word or phrase</label><input id="term" placeholder="Enter word or phrase" autocomplete="off"></div>
    <div><label for="level">Hindi style</label><select id="level"><option>Government exam-focused Hindi</option><option>Simple Hindi</option><option>Very simple beginner Hindi</option><option>Formal Hindi</option></select></div>
    <div class="row"><button id="go" onclick="generateEntry()">Generate + Save</button><button class="secondary" onclick="saveCurrent()">Save again</button><button class="secondary" onclick="copyCurrent()">Copy</button></div>
    <div class="samples" id="samples"></div>
    <div id="status" class="status"></div>
  </section>

  <section class="card">
    <div class="results">
      <div class="box"><div class="box-title">Section</div><div class="box-value" id="rMode">-</div></div>
      <div class="box"><div class="box-title">Word / Phrase</div><div class="box-value" id="rTerm">-</div></div>
      <div class="box"><div class="box-title">Hindi Meaning</div><div class="box-value meaning" id="rMeaning">-</div></div>
      <div class="box"><div class="box-title">Synonyms (2)</div><div class="box-value" id="rSyn">-</div></div>
      <div class="box"><div class="box-title">Antonyms (2)</div><div class="box-value" id="rAnt">-</div></div>
      <div class="box"><div class="box-title">Exam-style Example</div><div class="box-value" id="rEx">-</div></div>
      <div class="box"><div class="box-title">Example Meaning in Hindi</div><div class="box-value" id="rExHi">-</div></div>
    </div>
  </section>

  <section class="card history">
    <div class="history-head"><div><h2 style="margin:0">Saved vocabulary revision list</h2><p class="hint">Stored locally in this browser.</p></div><div class="row"><button onclick="savePdf()">Download / Save PDF</button><button class="secondary" onclick="downloadJson()">Download JSON</button><button class="danger" onclick="clearHistory()">Clear</button></div></div>
    <div id="history" class="history-list"></div>
  </section>
</main>

<script>
const KEY='vocab-ai-history-v3',OLD_KEYS=['vocab-ai-ssc-cgl-history-v2','vocab-ai-ssc-cgl-history-v1'];
let current=null,mode='Antonyms & Synonyms';
const $=id=>document.getElementById(id);
const FULL_ONE_WORD='One Word Substitution';
const FULL_ANT_SYN='Antonyms & Synonyms';
const modes={
  [FULL_ONE_WORD]:{label:'Word or phrase',samples:['bibliophile','philanthropist','omnipresent','optimist','introvert']},
  'Idioms':{label:'Word or phrase',samples:['a blessing in disguise','once in a blue moon','spill the beans','break the ice','hit the nail on the head']},
  [FULL_ANT_SYN]:{label:'Word or phrase',samples:['benevolent','diligent','mitigate','obsolete','prudent']},
  'Spellings':{label:'Word or phrase',samples:['accommodate','separate','perseverance','conscience','exaggerate']}
};
const built={
benevolent:{m:'दयालु, परोपकारी',s:['kind','generous'],a:['cruel','selfish'],e:'The benevolent officer helped the poor villagers.',h:'दयालु अधिकारी ने गरीब ग्रामीणों की सहायता की।'},
diligent:{m:'मेहनती, परिश्रमी',s:['hardworking','industrious'],a:['lazy','careless'],e:'A diligent candidate revises vocabulary every day.',h:'एक मेहनती अभ्यर्थी प्रतिदिन शब्दावली दोहराता है।'},
mitigate:{m:'कम करना, घटाना',s:['reduce','lessen'],a:['aggravate','increase'],e:'Good planning can mitigate exam pressure.',h:'अच्छी योजना परीक्षा के दबाव को कम कर सकती है।'},
obsolete:{m:'पुराना, अप्रचलित',s:['outdated','archaic'],a:['modern','current'],e:'Many obsolete words are rarely used in modern English.',h:'कई अप्रचलित शब्द आधुनिक अंग्रेजी में शायद ही उपयोग होते हैं।'},
prudent:{m:'समझदार, विवेकपूर्ण',s:['wise','sensible'],a:['foolish','careless'],e:'A prudent student checks every option before marking the answer.',h:'एक समझदार विद्यार्थी उत्तर चिह्नित करने से पहले हर विकल्प जांचता है।'},
bibliophile:{m:'पुस्तक प्रेमी',s:['book lover','reader'],a:['nonreader','illiterate'],e:'A bibliophile enjoys collecting useful books.',h:'पुस्तक प्रेमी उपयोगी पुस्तकें इकट्ठा करना पसंद करता है।'},
philanthropist:{m:'परोपकारी व्यक्ति, दानवीर',s:['benefactor','humanitarian'],a:['miser','egoist'],e:'The philanthropist donated money for education.',h:'दानवीर ने शिक्षा के लिए धन दान किया।'},
omnipresent:{m:'सर्वव्यापी, हर जगह उपस्थित',s:['ubiquitous','universal'],a:['rare','absent'],e:'Mobile phones are almost omnipresent today.',h:'आज मोबाइल फोन लगभग हर जगह उपस्थित हैं।'},
optimist:{m:'आशावादी व्यक्ति',s:['positive thinker','hopeful person'],a:['pessimist','cynic'],e:'An optimist expects improvement after hard work.',h:'आशावादी व्यक्ति कठिन परिश्रम के बाद सुधार की आशा करता है।'},
introvert:{m:'अंतर्मुखी व्यक्ति',s:['reserved person','shy person'],a:['extrovert','outgoing person'],e:'An introvert may prefer studying alone.',h:'अंतर्मुखी व्यक्ति अकेले पढ़ना पसंद कर सकता है।'},
'a blessing in disguise':{m:'ऐसी बुरी लगने वाली बात जो बाद में अच्छी सिद्ध हो',s:['hidden benefit','unexpected advantage'],a:['clear misfortune','obvious loss'],e:'Losing the first mock test was a blessing in disguise because it showed his weak areas.',h:'पहला मॉक टेस्ट खराब होना बाद में लाभदायक सिद्ध हुआ क्योंकि उससे उसकी कमजोरियां पता चलीं।'},
'once in a blue moon':{m:'बहुत कम, कभी-कभार',s:['rarely','seldom'],a:['often','frequently'],e:'He misses his vocabulary revision once in a blue moon.',h:'वह शब्दावली का पुनरावृत्ति कार्य बहुत कम छोड़ता है।'},
'spill the beans':{m:'राज खोल देना',s:['reveal','disclose'],a:['hide','conceal'],e:'Do not spill the beans before the final result.',h:'अंतिम परिणाम से पहले राज मत खोलो।'},
'break the ice':{m:'झिझक दूर करना, बातचीत शुरू करना',s:['start conversation','ease tension'],a:['create tension','remain silent'],e:'The teacher asked a simple question to break the ice.',h:'शिक्षक ने झिझक दूर करने के लिए एक सरल प्रश्न पूछा।'},
'hit the nail on the head':{m:'बिल्कुल सही बात कहना',s:['be exact','be correct'],a:['miss the point','be wrong'],e:'Her explanation hit the nail on the head.',h:'उसकी व्याख्या बिल्कुल सही थी।'},
accommodate:{m:'समायोजित करना, जगह देना',s:['adjust','fit'],a:['exclude','reject'],e:'The hall can accommodate many candidates.',h:'हॉल में कई अभ्यर्थियों को जगह दी जा सकती है।'},
separate:{m:'अलग, पृथक करना',s:['divide','detach'],a:['join','combine'],e:'Keep separate notes for difficult words.',h:'कठिन शब्दों के लिए अलग नोट्स रखें।'},
perseverance:{m:'दृढ़ता, लगातार प्रयास',s:['persistence','determination'],a:['laziness','surrender'],e:'Perseverance is necessary for exam preparation.',h:'परीक्षा की तैयारी के लिए दृढ़ता आवश्यक है।'},
conscience:{m:'अंतरात्मा, विवेक',s:['morality','inner voice'],a:['immorality','shamelessness'],e:'His conscience stopped him from cheating.',h:'उसकी अंतरात्मा ने उसे नकल करने से रोका।'},
exaggerate:{m:'बढ़ा-चढ़ाकर कहना',s:['overstate','magnify'],a:['understate','minimize'],e:'Do not exaggerate your marks in the form.',h:'फॉर्म में अपने अंक बढ़ा-चढ़ाकर न लिखें।'}
};
function status(t,c=''){let el=$('status');el.textContent=t;el.className='status '+c}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function normalizeMode(v){let s=String(v||FULL_ANT_SYN);if(s.length===3&&s.charAt(0)==='O')return FULL_ONE_WORD;if(s==='Anto & Syno'||s==='Antonyms and synonyms')return FULL_ANT_SYN;return s}
function uniq(a){return[...new Set((a||[]).map(x=>typeof x==='string'?x:x.word).filter(Boolean).map(x=>x.trim().toLowerCase()).filter(Boolean))]}
function two(a,f1,f2){let v=uniq(a).slice(0,2);if(v.length<1)v.push(f1);if(v.length<2)v.push(f2);return v}
async function json(url){let r=await fetch(url);if(!r.ok)throw Error('fetch');return r.json()}
async function hi(text){try{let j=await json('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair=en|hi');return (j.responseData&&j.responseData.translatedText||'').trim()}catch(e){return''}}
async function words(term,rel){try{return uniq(await json('https://api.datamuse.com/words?'+rel+'='+encodeURIComponent(term)+'&max=10'))}catch(e){return[]}}
async function example(term){if(term.includes(' '))return 'The phrase "'+term+'" can appear in a government exam English question.';try{let j=await json('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(term));for(let m of j[0].meanings||[])for(let d of m.definitions||[])if(d.example)return d.example}catch(e){}return 'The word "'+term+'" is useful for government exam vocabulary revision.'}
function setMode(next){mode=normalizeMode(next);document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('termLabel').textContent='Word or phrase';$('term').placeholder='Enter word or phrase';renderSamples();status('Section selected: '+mode,'ok')}
function renderSamples(){let samples=modes[mode].samples;$('samples').innerHTML=samples.map(w=>'<span class="sample" onclick="sample(\''+esc(w).replace(/'/g,'\\&#39;')+'\')">'+esc(w)+'</span>').join('')}
async function generateEntry(){let term=$('term').value.trim();if(!term){status('Enter a word or phrase first.','err');return}let key=term.toLowerCase();$('go').disabled=true;status('Generating revision entry...','warn');try{let data;if(built[key]){let b=built[key];data={mode,term,meaning:b.m,synonyms:b.s,antonyms:b.a,example:b.e,exampleHindi:b.h,date:new Date().toLocaleString()}}else{let [meaning,syn,ant,ex]=await Promise.all([hi(term),words(term,'rel_syn'),words(term,'rel_ant'),example(term)]);let exHi=await hi(ex);data={mode,term,meaning:meaning||'Hindi meaning not found automatically',synonyms:two(syn,'similar word not found','similar word not found'),antonyms:two(ant,'opposite word not found','opposite word not found'),example:ex,exampleHindi:exHi||'Hindi translation not found automatically',date:new Date().toLocaleString()}}current=data;renderResult(data);saveCurrent(true);status('Generated and saved for revision.','ok')}catch(e){status('Lookup failed. Try another word or phrase.','err')}finally{$('go').disabled=false}}
function renderResult(d){d.mode=normalizeMode(d.mode);$('rMode').textContent=d.mode||mode;$('rTerm').textContent=d.term;$('rMeaning').textContent=d.meaning;$('rSyn').textContent=d.synonyms.join(', ');$('rAnt').textContent=d.antonyms.join(', ');$('rEx').textContent=d.example;$('rExHi').textContent=d.exampleHindi}
function history(){try{let a=JSON.parse(localStorage.getItem(KEY)||'[]');if(!a.length){for(let oldKey of OLD_KEYS){let old=JSON.parse(localStorage.getItem(oldKey)||'[]');if(old.length){a=old.map(x=>({...x,mode:normalizeMode(x.mode)}));localStorage.setItem(KEY,JSON.stringify(a));return a}}}return a.map(x=>({...x,mode:normalizeMode(x.mode)}))}catch(e){return[]}}
function setHistory(a){localStorage.setItem(KEY,JSON.stringify(a.map(x=>({...x,mode:normalizeMode(x.mode)}))));renderHistory()}
function saveCurrent(silent=false){if(!current){if(!silent)status('Generate an entry first.','err');return}current.mode=normalizeMode(current.mode);let a=history().filter(x=>(x.mode+'|'+x.term).toLowerCase()!=(current.mode+'|'+current.term).toLowerCase());a.unshift(current);setHistory(a);if(!silent)status('Saved for revision.','ok')}
function renderHistory(){let a=history(),el=$('history');if(!a.length){el.innerHTML='<div class="empty">No saved lookups yet. Generate a word to start your revision list.</div>';return}el.innerHTML=a.map((x,i)=>'<div class="item"><b>'+(i+1)+'. '+esc(x.term)+'</b><div class="meta">'+esc(normalizeMode(x.mode))+' | '+esc(x.date||'')+'</div><div>Hindi: '+esc(x.meaning)+'</div><div>Synonyms: '+esc(x.synonyms.join(', '))+'</div><div>Antonyms: '+esc(x.antonyms.join(', '))+'</div><div>Example: '+esc(x.example)+'</div><div>Example Hindi: '+esc(x.exampleHindi)+'</div></div>').join('')}
function text(d){return `Section: ${normalizeMode(d.mode)||mode}\nWord/Phrase: ${d.term}\nHindi Meaning: ${d.meaning}\nSynonyms (2): ${d.synonyms.join(', ')}\nAntonyms (2): ${d.antonyms.join(', ')}\nExample: ${d.example}\nExample Meaning in Hindi: ${d.exampleHindi}`}
async function copyCurrent(){if(!current){status('Generate an entry first.','err');return}await navigator.clipboard.writeText(text(current));status('Copied.','ok')}
function sample(w){$('term').value=w;generateEntry()}
function clearHistory(){if(confirm('Delete all saved vocabulary entries from this browser?'))setHistory([])}
function downloadJson(){let blob=new Blob([JSON.stringify(history(),null,2)],{type:'application/json'});download(blob,'vocab-ai-history.json')}
function download(blob,name){let u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function savePdf(){let a=history();if(!a.length){status('No saved entries to download.','err');return}let rows=a.map((d,i)=>`<section><h2>${i+1}. ${esc(d.term)}</h2><p><b>Section:</b> ${esc(normalizeMode(d.mode))}</p><p><b>Hindi Meaning:</b> ${esc(d.meaning)}</p><p><b>Synonyms:</b> ${esc(d.synonyms.join(', '))}</p><p><b>Antonyms:</b> ${esc(d.antonyms.join(', '))}</p><p><b>Example:</b> ${esc(d.example)}</p><p><b>Example Hindi:</b> ${esc(d.exampleHindi)}</p></section>`).join('');let w=window.open('','_blank');w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>vocab.ai Revision PDF</title><style>body{font-family:Arial,Noto Sans Devanagari,Nirmala UI,sans-serif;margin:28px;color:#111}h1{margin:0 0 4px}small{color:#555}section{break-inside:avoid;border-bottom:1px solid #ddd;padding:12px 0}h2{font-size:18px;margin:0 0 8px}p{margin:5px 0}@media print{button{display:none}}</style></head><body><button onclick="window.print()">Save as PDF</button><h1>Vocabulary Revision - vocab.ai</h1><small>Saved entries from your browser</small>${rows}<script>setTimeout(()=>window.print(),400)<\/script></body></html>`);w.document.close();status('PDF window opened. Choose Save as PDF.','ok')}
$('term').addEventListener('keydown',e=>{if(e.key==='Enter')generateEntry()});renderSamples();renderHistory();
</script>
</body>
</html>
